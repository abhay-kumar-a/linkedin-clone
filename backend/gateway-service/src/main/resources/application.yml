server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/auth/**
        - id: users-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: post-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/posts/**
        - id: company-job-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/company/**,/api/jobs/**,/api/category/**
        - id: chat-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/chats/**
        - id: file-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/files/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    instance:
      prefer-ip-address: true

jwt:
  secret: LinkedInCloneSecretKey2024VeryLongSecretKeyForJWTTokenGeneration
